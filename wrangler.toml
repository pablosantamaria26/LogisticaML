name = "logisticaml"
main = "worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── CRON TRIGGERS ────────────────────────────────────────────────────────────
# Día 25 a las 12:00 UTC = 09:00 AR → Resumen contador (crédito fiscal)
# Día  1 a las 11:00 UTC = 08:00 AR → Reporte dueño (mes anterior)
# Viernes a las 18:00 UTC = 15:00 AR → Reporte semanal IA
[triggers]
crons = [
  "0 12 25 * *",
  "0 11 1  * *",
  "0 18 * * 5"
]

# ─── KV NAMESPACE ─────────────────────────────────────────────────────────────
# Crear en: Cloudflare Dashboard → Workers & Pages → KV → Create namespace
# Nombre sugerido: flota-ml-kv
# Luego pegar el ID del namespace en "id":
[[kv_namespaces]]
binding = "FLOTA_KV"
id      = "REEMPLAZAR_CON_TU_KV_ID"
# preview_id = "REEMPLAZAR_CON_TU_KV_PREVIEW_ID"

# ─── SECRETS (NO poner valores reales aquí — usar wrangler secret put) ────────
