#   wrangler secret put SENDGRID_API_KEY
#   → API Key de Brevo (xkeysib-...)
#
#   wrangler secret put GEMINI_API_KEY
#   → API Key de Gemini (AIza...)
#
#   wrangler secret put FROM_EMAIL
#   → santamariapablodaniel@gmail.com (email VERIFICADO en Brevo)
#
#   wrangler secret put OWNER_EMAIL
#   → tu email personal (recibe reporte día 1 y reporte semanal)
#
#   wrangler secret put CONTADOR_EMAIL
#   → email del contador (recibe resumen día 25)
#
#   wrangler secret put VAPID_PRIVATE_KEY
